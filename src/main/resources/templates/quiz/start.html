<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuis — FinLit</title>
  <link rel="stylesheet" th:href="@{/css/finlit.css}">
  <link rel="icon" type="image/png" th:href="@{/favicon.jpg}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="hero" style="padding:4rem 0;">
  <div class="container" style="text-align:center;">
    <div class="overline-gold mb-2">Kuis Literasi</div>
    <h1 style="color:var(--text-on-dark); max-width:30rem; margin:0 auto 1rem;">
      Seberapa paham kamu soal keuangan?
    </h1>
    <p style="max-width:24rem; margin:0 auto 2.5rem;">
      Kuis ini terdiri dari
      <strong style="color:var(--gold);" th:text="${totalSoal}"></strong>
      soal pilihan ganda tentang budgeting, tabungan, investasi, dan kredit.
    </p>
    <div style="display:flex; flex-direction:column; align-items:center; gap:0.875rem;">
      <a th:href="@{/quiz/play}" class="btn btn-gold btn-lg"
         style="min-width:14rem;">Mulai Kuis</a>
      <a th:href="@{/dashboard}" class="btn btn-outline-dark"
         style="min-width:14rem;">Kembali ke Beranda</a>
    </div>
  </div>
</div>
<div class="container" style="padding:2rem 0 4rem;">
  <div style="display:flex; gap:1.25rem; max-width:40rem; margin:0 auto;">
    <div class="card" style="flex:1; text-align:center; padding:1.5rem;">
      <div style="font-family:'Fraunces',serif; font-size:2rem; font-weight:800;
                  color:var(--sage); margin-bottom:0.5rem;">4</div>
      <div class="text-sm text-muted">Topik utama keuangan</div>
    </div>
    <div class="card" style="flex:1; text-align:center; padding:1.5rem;">
      <div style="font-family:'Fraunces',serif; font-size:2rem; font-weight:800;
                  color:var(--gold); margin-bottom:0.5rem;"
           th:text="${totalSoal}">10</div>
      <div class="text-sm text-muted">Total soal</div>
    </div>
    <div class="card" style="flex:1; text-align:center; padding:1.5rem;">
      <div style="font-family:'Fraunces',serif; font-size:2rem; font-weight:800;
                  color:var(--red); margin-bottom:0.5rem;">A–D</div>
      <div class="text-sm text-muted">Format pilihan ganda</div>
    </div>
  </div>
</div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
