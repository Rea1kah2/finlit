<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artikel — FinLit</title>
  <link rel="stylesheet" th:href="@{/css/finlit.css}">
  <link rel="icon" type="image/png" th:href="@{/favicon.jpg}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-content">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div class="flex-between mb-3">
    <div class="page-header" style="margin-bottom:0;">
      <h2>Artikel Edukasi</h2>
      <p>Tingkatkan literasi keuanganmu.</p>
    </div>
    <a th:if="${isAdmin}" th:href="@{/articles/create}" class="btn btn-primary">Tulis Artikel</a>
  </div>

  <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem;">
    <a th:href="@{/articles}" class="btn btn-sm"
       th:classappend="${selectedCategory == null} ? 'btn-primary' : 'btn-secondary'">Semua</a>
    <a th:each="cat : ${categories}" th:href="@{/articles(category=${cat})}"
       class="btn btn-sm"
       th:classappend="${selectedCategory == cat} ? 'btn-primary' : 'btn-secondary'"
       th:text="${cat}"></a>
  </div>

  <div th:if="${articles.empty}" class="card">
    <div class="card-body"><div class="empty-state"><p>Belum ada artikel tersedia.</p></div></div>
  </div>

  <div class="grid-2">
    <div th:each="article : ${articles}" class="card" style="display:flex; flex-direction:column;">
      <div class="card-body" style="flex:1;">
        <div class="flex-between mb-1">
          <span class="badge badge-cat" th:text="${article.category}"></span>
          <span class="text-xs text-muted"
                th:text="${#temporals.format(article.createdAt, 'dd MMM yyyy')}"></span>
        </div>
        <h4 style="margin:0.75rem 0 0.5rem;" th:text="${article.title}"></h4>
        <p class="text-sm" th:text="${article.summary}"></p>
      </div>
      <div style="padding:1rem 1.75rem; border-top:1px solid var(--border-light);
                  display:flex; justify-content:space-between; align-items:center;">
        <a th:href="@{/articles/{id}(id=${article.id})}"
           class="btn btn-secondary btn-sm">Baca selengkapnya</a>

        <!-- Form dengan ID unik, tombol trigger modal (bukan confirm) -->
        <form th:if="${isAdmin}"
              th:id="'del-article-' + ${article.id}"
              th:action="@{/articles/delete/{id}(id=${article.id})}" method="post">
          <button type="button" class="btn btn-danger btn-sm"
                  th:attr="data-id=${article.id}, data-title=${article.title}"
                  onclick="openArticleDeleteModal(this)">
            Hapus
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Konfirmasi Hapus Artikel -->
<div id="articleDeleteModal" class="modal-overlay"
     onclick="handleOverlayClick(event,'articleDeleteModal')">
  <div class="modal-box modal-danger">
    <div class="modal-header">
      <h4>Hapus artikel ini?</h4>
      <div class="modal-subtitle" id="articleDeleteTitle">—</div>
    </div>
    <div class="modal-body" style="padding-top:1rem; padding-bottom:0.75rem;">
      <p>
        Artikel yang sudah dihapus <strong>tidak dapat dikembalikan.</strong>
        Pastikan kamu sudah yakin sebelum melanjutkan.
      </p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary"
              onclick="closeModal('articleDeleteModal')">
        Batal
      </button>
      <button type="button" id="confirmArticleDeleteBtn"
              style="flex:1.5; background:#c0392b; color:white; border:none;
                     font-weight:700; letter-spacing:0.01em;"
              class="btn">
        Hapus Sekarang
      </button>
    </div>
  </div>
</div>

<script>
  let pendingArticleForm = null;

  function openArticleDeleteModal(btn) {
    pendingArticleForm =
      document.getElementById('del-article-' + btn.dataset.id);
    document.getElementById('articleDeleteTitle').textContent =
      '"' + btn.dataset.title + '"';
    document.getElementById('articleDeleteModal').classList.add('active');
  }

  document.getElementById('confirmArticleDeleteBtn')
    .addEventListener('click', function() {
      if (pendingArticleForm) pendingArticleForm.submit();
    });

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
    pendingArticleForm = null;
  }

  function handleOverlayClick(e, id) {
    if (e.target === e.currentTarget) closeModal(id);
  }
</script>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
