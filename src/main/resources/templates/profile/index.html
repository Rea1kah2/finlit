<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil FinLit</title>
  <link rel="stylesheet" th:href="@{/css/finlit.css}">
  <link rel="icon" type="image/png" th:href="@{/favicon.jpg}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="hero" style="padding:2.5rem 0;">
  <div class="container">
    <div class="overline-gold mb-1">Akun</div>
    <div class="flex-between">
      <div>
        <h2 style="color:var(--text-on-dark);" th:text="${user.nama}">Nama</h2>
        <p th:text="${user.email}"></p>
      </div>
      <span th:if="${user.role.name() == 'ADMIN'}" class="badge badge-admin"
            style="font-size:0.875rem; padding:0.5rem 1rem;">Admin</span>
    </div>
  </div>
</div>
<div class="container page-content">
  <div style="max-width:36rem; margin:0 auto;">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
    <div class="card mb-3">
      <div class="card-body">
        <div class="section-title">Informasi Akun</div>
        <div style="display:flex; flex-direction:column; gap:0.875rem;">
          <div class="flex-between" style="padding:0.75rem 0; border-bottom:1px solid var(--border-light);">
            <span class="text-sm text-muted">Email</span>
            <span class="text-sm font-bold" th:text="${user.email}"></span>
          </div>
          <div class="flex-between" style="padding:0.75rem 0; border-bottom:1px solid var(--border-light);">
            <span class="text-sm text-muted">Peran</span>
            <span th:if="${user.role.name() == 'ADMIN'}" class="badge badge-admin">Admin</span>
            <span th:if="${user.role.name() == 'USER'}"  class="badge badge-user">Pengguna</span>
          </div>
          <div class="flex-between" style="padding:0.75rem 0;">
            <span class="text-sm text-muted">Bergabung</span>
            <span class="text-sm font-bold"
                  th:text="${#temporals.format(user.createdAt, 'dd MMMM yyyy')}"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="section-title">Edit Profil</div>
        <form th:action="@{/profile}" th:object="${profileDto}" method="post">
          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" th:field="*{nama}" class="form-control"
                   th:classappend="${#fields.hasErrors('nama')} ? 'is-invalid'">
            <span class="invalid-feedback" th:errors="*{nama}"></span>
          </div>
          <div class="divider"></div>
          <p class="text-sm text-muted mb-2">
            Kosongkan bagian kata sandi jika tidak ingin mengubahnya.
          </p>
          <div class="form-group">
            <label class="form-label">Kata Sandi Saat Ini</label>
            <input type="password" th:field="*{currentPassword}" class="form-control"
                   placeholder="Isi jika ingin ganti kata sandi">
          </div>
          <div class="grid-2" style="gap:0.875rem;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Kata Sandi Baru</label>
              <input type="password" th:field="*{newPassword}" class="form-control"
                     th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                     placeholder="Min. 6 karakter">
              <span class="invalid-feedback" th:errors="*{newPassword}"></span>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Konfirmasi</label>
              <input type="password" th:field="*{confirmPassword}" class="form-control"
                     placeholder="Ulangi kata sandi baru">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.5rem;">
            Simpan Perubahan
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
