<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Pengguna — FinLit</title>
  <link rel="stylesheet" th:href="@{/css/finlit.css}">
  <link rel="icon" type="image/png" th:href="@{/favicon.jpg}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-content">

  <div th:if="${success}" class="alert alert-success mb-2" th:text="${success}"></div>

  <div class="page-header">
    <h2>Manajemen Pengguna</h2>
    <p>Kelola seluruh akun pengguna FinLit.</p>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Email</th>
            <th>Peran</th>
            <th>Status</th>
            <th>Bergabung</th>
            <th>Tindakan</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user, stat : ${users}">
            <td class="text-muted" th:text="${stat.count}"></td>
            <td class="font-semibold" th:text="${user.nama}"></td>
            <td class="text-muted text-sm" th:text="${user.email}"></td>
            <td>
              <span th:if="${user.role.name() == 'ADMIN'}" class="badge badge-admin">Admin</span>
              <span th:if="${user.role.name() == 'USER'}"  class="badge badge-user">Pengguna</span>
            </td>
            <td>
              <span th:if="${user.isActive}"   class="badge badge-active">Aktif</span>
              <span th:unless="${user.isActive}" class="badge badge-inactive">Nonaktif</span>
            </td>
            <td class="text-muted text-sm"
                th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}"></td>
            <td>
              <div th:if="${user.id != currentUserId}" style="display:flex; gap:0.5rem;">
                <form th:action="@{/admin/users/{id}/toggle-active(id=${user.id})}" method="post">
                  <button type="submit" class="btn btn-sm"
                          th:classappend="${user.isActive} ? 'btn-danger' : 'btn-secondary'"
                          th:text="${user.isActive} ? 'Nonaktifkan' : 'Aktifkan'"></button>
                </form>
                <form th:action="@{/admin/users/{id}/toggle-role(id=${user.id})}" method="post">
                  <button type="submit" class="btn btn-secondary btn-sm"
                          th:text="${user.role.name() == 'ADMIN'} ? 'Set Pengguna' : 'Set Admin'"></button>
                </form>
              </div>
              <span th:if="${user.id == currentUserId}" class="text-muted text-xs">Akun kamu</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
  <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
